[build]
  command = "pnpm install && pnpm --filter @workspace/noor-landing run build"
  publish = "artifacts/noor-landing/dist"

[build.environment]
  PORT = "3000"
  BASE_PATH = "/"
  NODE_VERSION = "22"
  SECRETS_SCAN_OMIT_KEYS = "VITE_FIREBASE_API_KEY,VITE_ADMIN_PIN,VITE_CLOUDINARY_CLOUD_NAME,VITE_CLOUDINARY_UPLOAD_PRESET"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
